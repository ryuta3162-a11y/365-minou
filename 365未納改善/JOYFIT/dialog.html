<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    body {
      font-family: 'Meiryo', sans-serif;
      padding: 18px;
      color: #222;
      background: #f5f5f5;
    }
    .card {
      background: #ffffff;
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 16px;
    }
    h2 {
      font-size: 16px;
      margin: 0 0 8px;
      color: #c8102e;
      border-left: 4px solid #c8102e;
      padding-left: 8px;
    }
    p { font-size: 12px; color: #666; margin: 0 0 14px; }
    .form-group { margin-bottom: 14px; }
    label { display: block; font-weight: bold; font-size: 12px; margin-bottom: 4px; }
    input[type="text"], select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 13px;
    }
    #drop-zone {
      border: 2px dashed #c8102e;
      border-radius: 8px;
      background-color: #fff7f8;
      padding: 30px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }
    #drop-zone.dragover { background-color: #ffeef1; border-color: #8b1024; }
    #drop-zone p { margin: 0; color: #c8102e; font-weight: bold; font-size: 13px; }
    #drop-zone span { display: block; font-size: 11px; color: #888; margin-top: 4px; }
    #file-input { display: none; }
    #status { margin-top: 12px; font-size: 12px; font-weight: bold; text-align: center; min-height: 18px; }
    .success { color: #0f9d58; }
    .error { color: #d93025; }
    .loading { color: #f4b400; }
    .action-btn {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #c8102e;
      color: #fff;
      font-weight: bold;
      cursor: pointer;
    }
    .action-btn:hover { background: #8b1024; }
  </style>
</head>
<body>
  <div class="card">
  <h2>未納CSV取り込み</h2>
  <p>CSVデータを抽出してシートへ反映します。</p>

  <div class="form-group">
    <label for="target-sheet">書き込み対象シート</label>
    <select id="target-sheet">
      <option value="">読み込み中...</option>
    </select>
  </div>

  <div id="drop-zone">
    <p>CSVファイルを選択</p>
    <span>クリックまたはドラッグ＆ドロップ</span>
    <input type="file" id="file-input" accept=".csv">
  </div>

  <div id="status"></div>
  <button class="action-btn" onclick="fileInput.click()">CSVを選択</button>
  </div>

  <script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const statusDiv = document.getElementById('status');
    const targetSheetSelect = document.getElementById('target-sheet');

    // シート名の取得
    if (typeof google !== 'undefined' && google.script && google.script.run) {
      google.script.run
        .withSuccessHandler(function(sheetInfo) {
          targetSheetSelect.innerHTML = '';
          sheetInfo.allSheets.forEach(function(name) {
            const option = document.createElement('option');
            option.value = name;
            option.textContent = name;
            if (name === sheetInfo.activeSheet) option.selected = true;
            targetSheetSelect.appendChild(option);
          });
        })
        .withFailureHandler(function(error) {
          showStatus('シート一覧の取得に失敗: ' + error.message, 'error');
        })
        .getSheetInfo();
    } else {
      targetSheetSelect.innerHTML = '<option value="プレビュー">プレビュー</option>';
    }

    dropZone.addEventListener('click', function() { fileInput.click(); });
    dropZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', function() {
      dropZone.classList.remove('dragover');
    });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', function(e) {
      if (e.target.files.length > 0) handleFile(e.target.files[0]);
    });

    function handleFile(file) {
      const selectedOption = targetSheetSelect.options[targetSheetSelect.selectedIndex];
      const targetSheetName = (targetSheetSelect.value || (selectedOption ? selectedOption.textContent : "") || "").trim();
      if (!targetSheetName) {
        showStatus('対象シートを選択してください。', 'error');
        return;
      }
      if (!file || !file.name.toLowerCase().endsWith('.csv')) {
        showStatus('CSVファイルを選択してください。', 'error');
        return;
      }

      showStatus('データを抽出中...', 'loading');
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const csvData = parseCSV(e.target.result);
          showStatus('シートへ反映中...', 'loading');
          if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
              .withSuccessHandler(function(count) {
                showStatus(`完了: ${count}件を反映しました。`, 'success');
                setTimeout(google.script.host.close, 1500);
              })
              .withFailureHandler(function(error) {
                showStatus('エラー: ' + error.message, 'error');
              })
              .processUnpaidData(csvData, targetSheetName, "");
          } else {
            showStatus('プレビュー環境のため反映は実行していません。', 'success');
          }
        } catch (err) {
          showStatus('CSV解析に失敗しました。', 'error');
        }
      };
      reader.readAsText(file, 'Shift_JIS');
    }

    function showStatus(msg, className) {
      statusDiv.textContent = msg;
      statusDiv.className = className;
    }

    function parseCSV(str) {
      const result = [];
      let row = [];
      let inQuotes = false;
      let field = '';

      for (let i = 0; i < str.length; i++) {
        const char = str[i];
        if (inQuotes) {
          if (char === '"') {
            if (i + 1 < str.length && str[i + 1] === '"') {
              field += '"';
              i++;
            } else {
              inQuotes = false;
            }
          } else {
            field += char;
          }
        } else {
          if (char === '"') {
            inQuotes = true;
          } else if (char === ',') {
            row.push(field.trim());
            field = '';
          } else if (char === '\n' || char === '\r') {
            if (char === '\r' && i + 1 < str.length && str[i + 1] === '\n') i++;
            row.push(field.trim());
            result.push(row);
            row = [];
            field = '';
          } else {
            field += char;
          }
        }
      }
      if (field !== '' || row.length > 0) {
        row.push(field.trim());
        result.push(row);
      }
      return result;
    }
  </script>
</body>
</html>
